name: 🌙 Generate Lunar Calendar ICS (Daily)

on:
  schedule:
    # 每天北京时间8点执行（UTC时间0点）
    - cron: '0 0 * * *'

  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate-calendar:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🔄 Generate ICS calendars
        env:
          API_TOKEN: ${{ secrets.API_TOKEN }}
          API_URL: ${{ secrets.API_URL }}
        run: |
          YEAR=$(date +%Y)
          NEXT_YEAR=$((YEAR + 1))
          NEXT_NEXT_YEAR=$((YEAR + 2))

          echo "📅 生成年份：$YEAR, $NEXT_YEAR, $NEXT_NEXT_YEAR"

          # 生成三年合并日历
          python lunar_calendar_to_ics_secure.py $YEAR 1 $NEXT_NEXT_YEAR 12

          # 生成当前年份单年日历
          python lunar_calendar_to_ics_secure.py $YEAR 1 $YEAR 12

          # 生成明年单年日历
          python lunar_calendar_to_ics_secure.py $NEXT_YEAR 1 $NEXT_YEAR 12

      - name: 📋 List generated files
        run: |
          echo "✅ 生成的ICS文件："
          ls -lh *.ics

      - name: 💾 Commit ICS files to repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "GitHub Action"
          git add *.ics
          if git diff-index --quiet HEAD --; then
            echo "📌 没有文件变化，跳过提交"
          else
            git commit -m "🔄 Update lunar calendar ICS on $(date +'%Y-%m-%d')"
            git push
          fi

      - name: 📤 Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: ✅ Generate Summary
        run: |
          echo "## 🌙 农历日历生成完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**生成时间**：$(date +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**生成的文件**：" >> $GITHUB_STEP_SUMMARY
          ls -lh *.ics 2>/dev/null | awk '{print "- " $9 " (" $5 ")"}' >> $GITHUB_STEP_SUMMARY || echo "- 无文件生成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**部署状态**：✅ 成功" >> $GITHUB_STEP_SUMMARY
          echo "**访问地址**：${{ steps.deployment.outputs.page_url }}" >> $GITHUB_STEP_SUMMARY
